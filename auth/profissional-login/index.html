<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>Login de Profissional - PsicoTarefas</title>

  <meta name="theme-color" content="#6d5efc" />
  <meta
    name="description"
    content="Login de profissional no PsicoTarefas"
  />

  <link rel="icon" type="image/png" sizes="192x192" href="../../assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="../../assets/icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="../../shared/support.css" />
</head>
<body>
  <div class="auth-shell">
    <header class="auth-hero">
      <div class="auth-hero__topbar">
        <a class="back-link" href="../../index.html">← Voltar</a>
        <a class="support-link" href="https://wa.me/5543999525060?text=Ol%C3%A1!%20Preciso%20de%20ajuda%20com%20o%20PsicoTarefas." target="_blank" rel="noopener noreferrer" aria-label="Abrir suporte no WhatsApp">
          <span class="support-link__icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.05 4.91A9.82 9.82 0 0 0 12.03 2C6.6 2 2.18 6.42 2.18 11.85c0 1.74.45 3.44 1.31 4.95L2 22l5.34-1.4a9.8 9.8 0 0 0 4.69 1.2h.01c5.43 0 9.85-4.42 9.85-9.85a9.8 9.8 0 0 0-2.84-7.04Zm-7.01 15.23h-.01a8.14 8.14 0 0 1-4.15-1.14l-.3-.18-3.17.83.85-3.09-.2-.32a8.17 8.17 0 0 1-1.25-4.39c0-4.51 3.67-8.18 8.2-8.18a8.1 8.1 0 0 1 5.81 2.41 8.14 8.14 0 0 1 2.39 5.8c0 4.51-3.67 8.18-8.17 8.18Zm4.49-6.11c-.25-.12-1.47-.73-1.7-.82-.23-.08-.39-.12-.56.12-.16.25-.64.82-.78.99-.14.17-.29.19-.54.06-.25-.12-1.04-.38-1.99-1.21-.74-.66-1.25-1.47-1.39-1.72-.15-.25-.02-.38.11-.5.11-.11.25-.29.37-.43.12-.15.16-.25.25-.41.08-.17.04-.31-.02-.44-.06-.12-.56-1.35-.76-1.85-.2-.48-.4-.42-.56-.43h-.48c-.17 0-.44.06-.67.31-.23.25-.87.85-.87 2.07s.89 2.39 1.02 2.56c.12.17 1.75 2.67 4.23 3.74.59.26 1.06.42 1.42.54.6.19 1.14.16 1.56.1.48-.07 1.47-.6 1.68-1.18.21-.58.21-1.08.15-1.18-.06-.11-.23-.17-.48-.29Z" /></svg></span>
          <span>Suporte</span>
        </a>
      </div>

      <div class="auth-brand">
        <img
          src="../../assets/icons/icon-192.png"
          alt="Ícone do PsicoTarefas"
          class="auth-brand__logo"
        />

        <div class="auth-brand__text">
          <p class="auth-badge">Acesso de profissional</p>
          <h1>Entrar como profissional</h1>
          <p>
            Acesse sua conta para gerenciar pacientes, tarefas e respostas no PsicoTarefas.
          </p>
        </div>
      </div>
    </header>

    <main class="auth-main">
      <section class="auth-card">
        <div class="auth-mode">
          <span class="auth-mode__pill">Profissional</span>
          <span class="auth-mode__pill auth-mode__pill--secondary">Login</span>
        </div>

        <form id="authForm" novalidate>
          <div class="form-group">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Digite seu e-mail"
              autocomplete="email"
            />
            <small class="field-error" id="erroEmail"></small>
          </div>

          <div class="form-group">
            <label for="senha">Senha</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="senha"
                name="senha"
                placeholder="Digite sua senha"
                autocomplete="current-password"
              />
              <button type="button" class="toggle-password" data-target="senha">
                Mostrar
              </button>
            </div>
            <small class="field-error" id="erroSenha"></small>
          </div>

          <div class="form-options">
            <label class="checkbox-inline">
              <input type="checkbox" id="lembrar" />
              <span>Lembrar meu acesso neste dispositivo</span>
            </label>

            <a href="javascript:void(0)" class="text-link" id="linkEsqueciSenha">
              Esqueci minha senha
            </a>
          </div>

          <div class="form-message" id="formMessage" hidden></div>

          <button type="submit" class="btn-primary" id="btnSubmit">
            Entrar como profissional
          </button>
        </form>

        <div class="auth-footer">
          <p>Ainda não tem conta?</p>
          <a href="../profissional-cadastro/index.html" class="text-link text-link--strong">
            Criar conta de profissional
          </a>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
