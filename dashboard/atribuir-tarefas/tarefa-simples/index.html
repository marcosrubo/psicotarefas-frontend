<body>

      <div class="topbar__nav">
        <a class="back-link" href="../index.html">← Voltar</a>

        <a class="brand brand--centered" href="../index.html" aria-label="Voltar para atribuir tarefas">

            src="../../../assets/icons/icon-192.png"
            alt="Ícone do PsicoTarefas"
            class="brand__logo"

      </div>

      <div class="title-strip">
        <h1>TAREFA SIMPLES</h1>
      </div>
    </header>

    <main class="task-simple-main">
      <div class="screen-message screen-message--error" id="screenMessage" hidden></div>

      <section class="patient-chip-card">
        <p class="patient-chip-card__label">Paciente selecionado</p>
        <strong class="patient-chip-card__name" id="selectedPatientName">Carregando...</strong>
      </section>

      <section class="form-card">
        <div class="section-header">
          <h2>Nova tarefa</h2>
        </div>

        <form id="simpleTaskForm" class="task-form">
          <div class="form-group">
            <label for="taskTitleInput">Título</label>
            <input
              type="text"
              id="taskTitleInput"
              placeholder="Ex.: Registro de pensamentos automáticos"
              maxlength="160"
            />
          </div>

          <div class="form-group">
            <label for="taskDescriptionInput">Descrição da tarefa</label>
            <textarea
              id="taskDescriptionInput"
              rows="7"
              placeholder="Descreva a tarefa que será realizada pelo paciente..."
            ></textarea>
          </div>

          <div class="screen-message" id="formMessage" hidden></div>

          <div class="task-form__actions">
            <a class="btn-secondary" href="../index.html">CANCELAR</a>
            <button class="btn-primary" id="btnSaveTask" type="submit">GRAVAR</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
