<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
  />
  <title>Dashboard Paciente - PsicoTarefas</title>

  <meta name="theme-color" content="#6d5efc" />
  <meta name="description" content="Dashboard do paciente sem vínculo no PsicoTarefas" />

  <link rel="icon" type="image/png" sizes="192x192" href="../../assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="../../assets/icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="dashboard-shell">
    <header class="topbar">
      <div class="brand">
        <img
          src="../../assets/icons/icon-192.png"
          alt="Ícone do PsicoTarefas"
          class="brand__logo"
        />
        <div class="brand__text">
          <p class="brand__badge">Painel de PACIENTE</p>
          <h1>PsicoTarefas</h1>
        </div>
      </div>

      <div class="topbar__actions">
        <div class="user-chip">
          <div class="user-chip__avatar" id="userAvatar">PT</div>
          <div class="user-chip__text">
            <strong id="userName">Paciente</strong>
            <span id="userRole">Sem vínculo ativo</span>
          </div>
        </div>

        <button class="btn-ghost" id="btnLogout" type="button">Sair</button>
      </div>
    </header>

    <main class="dashboard-main">
      <section class="welcome-card">
        <div class="welcome-card__content">
          <p class="welcome-card__label">Painel do paciente</p>
          <h2 id="welcomeTitle">Olá</h2>
          <p id="welcomeText">
            Você ainda não possui vínculo ativo. Escolha um profissional abaixo para pedir vínculo.
          </p>
        </div>
      </section>

      <section class="panel">
        <div class="panel__header">
          <h3>Profissionais disponíveis</h3>
          <p>Escolha um profissional e envie sua solicitação de vínculo.</p>
        </div>

        <div class="search-box">
          <input
            type="text"
            id="searchProfessional"
            placeholder="Buscar profissional pelo nome"
            autocomplete="off"
          />
        </div>

        <div class="form-message" id="requestMessage" hidden></div>

        <div class="professionals-list" id="professionalsList"></div>

        <div class="empty-state" id="professionalsEmpty" hidden>
          Nenhum profissional encontrado.
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
